# .github/workflows/deploy.yml
name: Deploy Vite site to Pages

on:
  # 當 push 到 main 分支時觸發
  push:
    branches: ['main']

# 設定 GITHUB_TOKEN 權限，允許部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 避免同時執行多個部署
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # 1. 安裝與打包
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Vite 預設打包輸出的資料夾

  # 2. 部署到 GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4